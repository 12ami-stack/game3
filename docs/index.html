<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>円形ブロック崩し（修正版）</title>
<style>
body { background: #111; color: #eee; text-align: center; font-family: sans-serif; margin: 0; }
canvas { background: #000; border: 1px solid #555; margin-top: 10px; cursor: crosshair; }
</style>
</head>
<body>
<h2>円形ブロック崩し</h2>
<p>操作：マウス移動(パドル回転) / クリック or スペース(ビーム発射)</p>
<canvas id="game" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = 600, H = 600, cx = 300, cy = 300;

const fieldRadius = 260;
const blockRadius = 200;
const paddleRadius = 170;
const paddleWidthAngle = Math.PI / 14;
let paddleAngle = -Math.PI / 2;
let lives = 10;

let ball = { x: cx, y: cy, vx: 3, vy: -3, r: 8 };
let beam = null;

const blocks = [];
for (let i = 0; i < 36; i++) {
    const angle = (i / 36) * Math.PI * 2;
    blocks.push({ 
        x: cx + Math.cos(angle) * blockRadius, 
        y: cy + Math.sin(angle) * blockRadius, 
        alive: true 
    });
}

// 入力処理
const keys = { left: false, right: false };
window.addEventListener("keydown", e => { 
    if(e.key === "ArrowLeft") keys.left = true; 
    if(e.key === "ArrowRight") keys.right = true; 
    if(e.key === " ") fireBeam(); 
});
window.addEventListener("keyup", e => { 
    if(e.key === "ArrowLeft") keys.left = false; 
    if(e.key === "ArrowRight") keys.right = false; 
});
canvas.addEventListener("mousedown", fireBeam); // 左クリックで発射

function fireBeam() {
    if (beam) return;
    const speed = 10;
    // パドルの方向（中心に向かうベクトル）を計算
    const angleToCenter = paddleAngle + Math.PI; 
    beam = {
        x: cx + Math.cos(paddleAngle) * paddleRadius,
        y: cy + Math.sin(paddleAngle) * paddleRadius,
        vx: Math.cos(angleToCenter) * speed,
        vy: Math.sin(angleToCenter) * speed
    };
}

canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    paddleAngle = Math.atan2((e.clientY - rect.top) - cy, (e.clientX - rect.left) - cx);
});

function update() {
    if(keys.left) paddleAngle -= 0.05;
    if(keys.right) paddleAngle += 0.05;

    if (beam) {
        beam.x += beam.vx; beam.y += beam.vy;
        
        // 中心まで到達したら消去
        const d = Math.hypot(beam.x - cx, beam.y - cy);
        if (d < 20) beam = null; 
        
        // 玉との衝突（当たり判定を少し大きく）
        if (beam && Math.hypot(beam.x - ball.x, ball.y - beam.y) < 20) {
            const angleToCenter = Math.atan2(cy - ball.y, cx - ball.x);
            const speed = Math.hypot(ball.vx, ball.vy);
            ball.vx = Math.cos(angleToCenter) * speed;
            ball.vy = Math.sin(angleToCenter) * speed;
            beam = null;
        }
    }

    ball.x += ball.vx; ball.y += ball.vy;
    
    // 外壁反射
    const dist = Math.hypot(ball.x - cx, ball.y - cy);
    if (dist + ball.r > fieldRadius) {
        const angle = Math.atan2(ball.y - cy, ball.x - cx);
        const speed = Math.hypot(ball.vx, ball.vy);
        ball.vx = Math.cos(angle + Math.PI) * speed;
        ball.vy = Math.sin(angle + Math.PI) * speed;
        ball.x = cx + Math.cos(angle) * (fieldRadius - ball.r);
        ball.y = cy + Math.sin(angle) * (fieldRadius - ball.r);
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    
    // ブロック
    ctx.fillStyle = "#4af";
    blocks.forEach(b => { if(b.alive) ctx.fillRect(b.x-10, b.y-10, 20, 20); });
    
    // パドル
    ctx.strokeStyle = "#fa4"; ctx.lineWidth = 10;
    ctx.beginPath(); 
    ctx.arc(cx, cy, paddleRadius, paddleAngle - paddleWidthAngle, paddleAngle + paddleWidthAngle); 
    ctx.stroke();
    
    // 玉
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
    
    // ビーム
    if (beam) { ctx.fillStyle = "#ff0"; ctx.fillRect(beam.x-5, beam.y-5, 10, 10); }

    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
